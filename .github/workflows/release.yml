name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create tarball
        run: |
          cd .build/release
          tar czf "../../Switchbar-${GITHUB_REF_NAME}-arm64.tar.gz" Switchbar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Switchbar-*.tar.gz
          generate_release_notes: true
